<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Helvetica Neue, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="720" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">FreeGerminal: Pipeline Architecture and Component Replacements</text>

  <!-- Column headers -->
  <!-- Original column -->
  <rect x="30" y="55" width="360" height="32" rx="6" fill="#e8eaf6"/>
  <text x="210" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#3949ab">Original Germinal</text>

  <!-- FreeGerminal column -->
  <rect x="510" y="55" width="360" height="32" rx="6" fill="#e8f5e9"/>
  <text x="690" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">FreeGerminal</text>

  <!-- Arrow header -->
  <text x="450" y="76" text-anchor="middle" font-size="11" fill="#666">replaces</text>

  <!-- ============================================================ -->
  <!-- STAGE 1: Diffusion Design -->
  <!-- ============================================================ -->
  <text x="450" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" letter-spacing="1">STAGE 1 — DIFFUSION DESIGN</text>
  <line x1="80" y1="113" x2="365" y2="113" stroke="#bbb" stroke-width="0.8"/>
  <line x1="535" y1="113" x2="820" y2="113" stroke="#bbb" stroke-width="0.8"/>

  <!-- AF-Multimer (unchanged) - spans both -->
  <rect x="30" y="120" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="210" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">AF-Multimer</text>
  <text x="210" y="151" text-anchor="middle" font-size="10" fill="#1976d2">Structure prediction · gradient source</text>

  <rect x="510" y="120" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="690" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">AF-Multimer</text>
  <text x="690" y="151" text-anchor="middle" font-size="10" fill="#1976d2">Unchanged · MIT / CC BY 4.0</text>

  <!-- Arrow between AF-Multimer -->
  <text x="450" y="145" text-anchor="middle" font-size="18" fill="#bbb">→</text>

  <!-- IgLM → AbLang (REPLACED) -->
  <rect x="30" y="170" width="360" height="48" rx="6" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="210" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">IgLM</text>
  <text x="210" y="200" text-anchor="middle" font-size="10" fill="#c62828">Antibody LM · sequence naturalness loss</text>
  <text x="210" y="212" text-anchor="middle" font-size="9" fill="#e53935">⚠ JHU non-commercial license</text>

  <!-- Replace arrow -->
  <line x1="392" y1="194" x2="508" y2="194" stroke="#e53935" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="408" y="182" width="76" height="16" rx="3" fill="#e53935"/>
  <text x="446" y="194" text-anchor="middle" font-size="9" fill="white" font-weight="bold">REPLACED</text>

  <rect x="510" y="170" width="360" height="48" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="690" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">AbLang1-heavy</text>
  <text x="690" y="200" text-anchor="middle" font-size="10" fill="#2e7d32">Antibody LM · pseudo-log-likelihood gradient</text>
  <text x="690" y="212" text-anchor="middle" font-size="9" fill="#388e3c">✓ Apache 2.0 · Oxford Protein Informatics Group</text>

  <!-- Note: AbLang implementation credit -->
  <text x="690" y="228" text-anchor="middle" font-size="8.5" fill="#666" font-style="italic">Implementation by Germinal team (PR #55, #64, #68); adopted in FreeGerminal</text>

  <!-- PCGrad merge note -->
  <rect x="270" y="232" width="360" height="18" rx="4" fill="#fff8e1" stroke="#ffe082" stroke-width="1"/>
  <text x="450" y="245" text-anchor="middle" font-size="9" fill="#f57f17">PCGrad gradient merging: AF-Multimer + AbLang gradients combined at each diffusion step</text>

  <!-- ============================================================ -->
  <!-- STAGE 2: Initial Cofolding Filter -->
  <!-- ============================================================ -->
  <text x="450" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" letter-spacing="1">STAGE 2 — INITIAL COFOLDING FILTER</text>
  <line x1="80" y1="273" x2="365" y2="273" stroke="#bbb" stroke-width="0.8"/>
  <line x1="535" y1="273" x2="820" y2="273" stroke="#bbb" stroke-width="0.8"/>

  <rect x="30" y="280" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="210" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Chai-1</text>
  <text x="210" y="311" text-anchor="middle" font-size="10" fill="#1976d2">Structure prediction · iPTM / pLDDT filter</text>

  <rect x="510" y="280" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="690" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Chai-1</text>
  <text x="690" y="311" text-anchor="middle" font-size="10" fill="#1976d2">Unchanged · Apache 2.0</text>

  <text x="450" y="305" text-anchor="middle" font-size="18" fill="#bbb">→</text>

  <!-- ============================================================ -->
  <!-- STAGE 3: AbMPNN Redesign -->
  <!-- ============================================================ -->
  <text x="450" y="338" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" letter-spacing="1">STAGE 3 — SEQUENCE REDESIGN</text>
  <line x1="80" y1="343" x2="365" y2="343" stroke="#bbb" stroke-width="0.8"/>
  <line x1="535" y1="343" x2="820" y2="343" stroke="#bbb" stroke-width="0.8"/>

  <rect x="30" y="350" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="210" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">AbMPNN</text>
  <text x="210" y="381" text-anchor="middle" font-size="10" fill="#1976d2">Non-interface CDR residue redesign</text>

  <rect x="510" y="350" width="360" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="690" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">AbMPNN</text>
  <text x="690" y="381" text-anchor="middle" font-size="10" fill="#1976d2">Unchanged · MIT</text>

  <text x="450" y="375" text-anchor="middle" font-size="18" fill="#bbb">→</text>

  <!-- ============================================================ -->
  <!-- STAGE 4: Final Filter -->
  <!-- ============================================================ -->
  <text x="450" y="408" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" letter-spacing="1">STAGE 4 — FINAL FILTER</text>
  <line x1="80" y1="413" x2="365" y2="413" stroke="#bbb" stroke-width="0.8"/>
  <line x1="535" y1="413" x2="820" y2="413" stroke="#bbb" stroke-width="0.8"/>

  <!-- PyRosetta block (original) -->
  <rect x="30" y="420" width="360" height="148" rx="6" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="210" y="437" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">PyRosetta</text>
  <text x="210" y="451" text-anchor="middle" font-size="9" fill="#e53935">⚠ Commercial license required (UW Tech Transfer)</text>

  <line x1="50" y1="458" x2="370" y2="458" stroke="#f8bbd0" stroke-width="0.8"/>

  <text x="50" y="472" font-size="9.5" fill="#b71c1c">• FastRelax</text>
  <text x="200" y="472" font-size="9" fill="#888">structure relaxation</text>
  <text x="50" y="488" font-size="9.5" fill="#b71c1c">• SASA calculation</text>
  <text x="200" y="488" font-size="9" fill="#888">solvent accessibility</text>
  <text x="50" y="504" font-size="9.5" fill="#b71c1c">• Shape complementarity</text>
  <text x="200" y="504" font-size="9" fill="#888">interface geometry</text>
  <text x="50" y="520" font-size="9.5" fill="#b71c1c">• Interface scoring (dG, SAP)</text>
  <text x="200" y="520" font-size="9" fill="#888">binding energy</text>
  <text x="50" y="536" font-size="9.5" fill="#b71c1c">• binder_score / interface_dG</text>
  <text x="200" y="536" font-size="9" fill="#888">Rosetta REU force field</text>
  <text x="50" y="552" font-size="9.5" fill="#b71c1c">• IgLM lm_ll scoring</text>
  <text x="200" y="552" font-size="9" fill="#888">sequence naturalness</text>

  <!-- Replace arrow for stage 4 -->
  <line x1="392" y1="494" x2="508" y2="494" stroke="#e53935" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="408" y="482" width="76" height="16" rx="3" fill="#e53935"/>
  <text x="446" y="494" text-anchor="middle" font-size="9" fill="white" font-weight="bold">REPLACED</text>

  <!-- OpenMM etc. block (FreeGerminal) -->
  <rect x="510" y="420" width="360" height="148" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="690" y="437" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">Open-Source Alternatives</text>
  <text x="690" y="451" text-anchor="middle" font-size="9" fill="#388e3c">✓ MIT / Apache 2.0 / LGPL · no license required</text>

  <line x1="530" y1="458" x2="850" y2="458" stroke="#c8e6c9" stroke-width="0.8"/>

  <text x="530" y="472" font-size="9.5" fill="#1b5e20">• OpenMM + FASPR</text>
  <text x="680" y="472" font-size="9" fill="#555">L-BFGS + OBC2 implicit solvent</text>
  <text x="530" y="488" font-size="9.5" fill="#1b5e20">• FreeSASA</text>
  <text x="680" y="488" font-size="9" fill="#555">Lee-Richards algorithm</text>
  <text x="530" y="504" font-size="9.5" fill="#1b5e20">• sc-rs (Rust)</text>
  <text x="680" y="504" font-size="9" fill="#555">Connolly surface SC calculation</text>
  <text x="530" y="520" font-size="9.5" fill="#1b5e20">• Biopython NeighborSearch</text>
  <text x="680" y="520" font-size="9" fill="#555">interface geometry &amp; contacts</text>
  <text x="530" y="536" font-size="9.5" fill="#1b5e20">• Fixed pass-through values †</text>
  <text x="680" y="536" font-size="9" fill="#555">binder_score / interface_dG</text>
  <text x="530" y="552" font-size="9.5" fill="#1b5e20">• AbLang1 PLL scoring</text>
  <text x="680" y="552" font-size="9" fill="#555">pseudo-log-likelihood</text>

  <!-- Chai-1 final (unchanged) -->
  <rect x="30" y="578" width="360" height="36" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="210" y="593" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Chai-1 Final Scoring</text>
  <text x="210" y="607" text-anchor="middle" font-size="10" fill="#1976d2">sc-RMSD · iPTM · pLDDT · pAE</text>

  <rect x="510" y="578" width="360" height="36" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="690" y="593" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Chai-1 Final Scoring</text>
  <text x="690" y="607" text-anchor="middle" font-size="10" fill="#1976d2">Unchanged · Apache 2.0</text>

  <text x="450" y="600" text-anchor="middle" font-size="18" fill="#bbb">→</text>

  <!-- Output -->
  <rect x="270" y="626" width="360" height="34" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="450" y="641" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Accepted VHH Designs</text>
  <text x="450" y="655" text-anchor="middle" font-size="9.5" fill="#bf360c">PDB structures · sequences · interface metrics</text>

  <!-- Footnote -->
  <text x="30" y="690" font-size="8.5" fill="#888">† binder_score, interface_dG, and interface_hbonds use fixed pass-through values following FreeBindCraft (Ring, 2025); these filters rarely trigger rejections in practice.</text>
  <text x="30" y="703" font-size="8.5" fill="#888">AbLang gradient implementation by the Germinal team (Mille-Fragoso et al., 2025, PR #55/#64/#68); adopted without modification in FreeGerminal.</text>
  <text x="30" y="716" font-size="8.5" fill="#888">sc-rs and pr_alternative_utils.py adapted from FreeBindCraft (Ring, 2025, Apache 2.0).</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e53935"/>
    </marker>
  </defs>

</svg>
