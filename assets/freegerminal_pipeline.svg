<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="Helvetica Neue, Arial, sans-serif">

  <rect width="920" height="760" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">FreeGerminal: Pipeline Architecture and Component Replacements</text>

  <!-- Column headers -->
  <rect x="30" y="48" width="375" height="36" rx="6" fill="#e8eaf6"/>
  <text x="217" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#3949ab">Original Germinal</text>
  <text x="217" y="78" text-anchor="middle" font-size="9.5" fill="#5c6bc0">commit 88d7f85 · v0.0.1 · IgLM v0.1.0 · PyRosetta 2025.39</text>

  <rect x="515" y="48" width="375" height="36" rx="6" fill="#e8f5e9"/>
  <text x="702" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">FreeGerminal v1.0.0</text>
  <text x="702" y="78" text-anchor="middle" font-size="9.5" fill="#388e3c">based on Germinal commit 1e1c1a5 · OpenMM · FreeSASA · sc-rs</text>

  <!-- ============================================================ -->
  <!-- STAGE 1 -->
  <!-- ============================================================ -->
  <text x="460" y="104" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#555" letter-spacing="1">STAGE 1 — GRADIENT-BASED SEQUENCE DESIGN</text>
  <line x1="80" y1="109" x2="355" y2="109" stroke="#ccc" stroke-width="0.8"/>
  <line x1="565" y1="109" x2="840" y2="109" stroke="#ccc" stroke-width="0.8"/>

  <!-- AF-Multimer -->
  <rect x="30" y="116" width="375" height="38" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="217" y="131" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">AF-Multimer</text>
  <text x="217" y="146" text-anchor="middle" font-size="9.5" fill="#1976d2">Structure prediction · pLDDT / iPTM / PAE loss</text>

  <rect x="515" y="116" width="375" height="38" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="702" y="131" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">AF-Multimer</text>
  <text x="702" y="146" text-anchor="middle" font-size="9.5" fill="#1976d2">Unchanged · CC BY 4.0</text>
  <text x="460" y="140" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- IgLM → AbLang: UPDATED by Germinal team, NOT replaced by us -->
  <rect x="30" y="163" width="375" height="48" rx="5" fill="#fff8e1" stroke="#ffcc02" stroke-width="1.5"/>
  <text x="217" y="179" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#e65100">IgLM v0.1.0</text>
  <text x="217" y="193" text-anchor="middle" font-size="9.5" fill="#e65100">Antibody language model · sequence naturalness loss</text>
  <text x="217" y="205" text-anchor="middle" font-size="8.5" fill="#f57f17">⚠ JHU non-commercial license (code MIT; commercial use restricted)</text>

  <!-- Orange "UPDATED" arrow - different from red REPLACED below -->
  <line x1="407" y1="187" x2="513" y2="187" stroke="#f57f17" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
  <rect x="418" y="176" width="84" height="15" rx="3" fill="#f57f17"/>
  <text x="460" y="187" text-anchor="middle" font-size="8.5" fill="white" font-weight="bold">UPDATED ①</text>

  <rect x="515" y="163" width="375" height="48" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="702" y="179" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1b5e20">AbLang1-heavy v0.3.1</text>
  <text x="702" y="193" text-anchor="middle" font-size="9.5" fill="#2e7d32">Antibody language model · pseudo-log-likelihood gradient</text>
  <text x="702" y="205" text-anchor="middle" font-size="8.5" fill="#388e3c">✓ Apache 2.0 · Oxford Protein Informatics Group</text>

  <!-- Footnote for update -->
  <rect x="200" y="218" width="520" height="16" rx="3" fill="#fff3e0" stroke="#ffe0b2" stroke-width="0.8"/>
  <text x="460" y="229" text-anchor="middle" font-size="8" fill="#bf360c">① AbLang integration by Germinal team (PR #55, #64, #68, commit 1e1c1a5). FreeGerminal sets ablang as pipeline default (previously iglm in vhh.yaml configs).</text>

  <!-- PCGrad -->
  <rect x="240" y="240" width="440" height="16" rx="3" fill="#fff8e1" stroke="#ffe082" stroke-width="0.8"/>
  <text x="460" y="251" text-anchor="middle" font-size="8.5" fill="#f57f17">PCGrad: AF-Multimer + AbLang gradients merged at each design step → update CDR logits [L × 20]</text>

  <!-- ============================================================ -->
  <!-- STAGE 2 -->
  <!-- ============================================================ -->
  <text x="460" y="272" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#555" letter-spacing="1">STAGE 2 — INITIAL COFOLDING FILTER</text>
  <line x1="80" y1="277" x2="355" y2="277" stroke="#ccc" stroke-width="0.8"/>
  <line x1="565" y1="277" x2="840" y2="277" stroke="#ccc" stroke-width="0.8"/>

  <rect x="30" y="284" width="375" height="38" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="217" y="299" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">Chai-1 (initial filter, 3 seeds)</text>
  <text x="217" y="314" text-anchor="middle" font-size="9.5" fill="#1976d2">iPTM / pLDDT threshold · 3 seeds (faster screening)</text>

  <rect x="515" y="284" width="375" height="38" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="702" y="299" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">Chai-1 (initial filter, 3 seeds)</text>
  <text x="702" y="314" text-anchor="middle" font-size="9.5" fill="#1976d2">Unchanged · CC BY 4.0</text>
  <text x="460" y="308" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- ============================================================ -->
