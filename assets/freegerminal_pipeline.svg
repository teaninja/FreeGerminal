  <text x="217" y="609" text-anchor="middle" font-size="9.5" fill="#1976d2">sc-RMSD · iPTM · pLDDT · pAE · filter thresholds</text>

  <rect x="515" y="578" width="375" height="36" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="702" y="593" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">Chai-1 v0.6.1 (final filter, 5 seeds)</text>
  <text x="702" y="609" text-anchor="middle" font-size="9.5" fill="#1976d2">Unchanged · Apache 2.0</text>
  <text x="460" y="601" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Output -->
  <rect x="280" y="628" width="360" height="32" rx="5" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5"/>
  <text x="460" y="643" text-anchor="middle" font-size="11" font-weight="bold" fill="#004d40">Accepted VHH Designs</text>
  <text x="460" y="656" text-anchor="middle" font-size="9" fill="#00695c">PDB structures · sequences · interface metrics</text>

  <!-- Footnotes -->
  <text x="30" y="682" font-size="8" fill="#888">† binder_score, interface_dG, and interface_hbonds use fixed pass-through values following the FreeBindCraft strategy (Ring, 2025, Apache 2.0); these filters rarely reject designs in practice.</text>
  <text x="30" y="695" font-size="8" fill="#888">② PyRosetta replacement (OpenMM, FreeSASA, sc-rs, Biopython) is the primary contribution of FreeGerminal, adapted from FreeBindCraft (Ring, 2025).</text>
  <text x="30" y="708" font-size="8" fill="#888">sc-rs adapted from FreeBindCraft (Ring, 2025, Apache 2.0). OpenMM relaxation protocol from pr_alternative_utils.py (FreeBindCraft, Apache 2.0).</text>
  <text x="30" y="721" font-size="8" fill="#888">① AbLang integration implemented by Germinal team (Mille-Fragoso et al., 2025, PR #55/#64/#68). FreeGerminal contribution: setting ablang as default in all VHH run configs.</text>

