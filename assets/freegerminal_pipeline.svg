  <!-- ============================================================ -->
  <text x="460" y="340" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#555" letter-spacing="1">STAGE 3 — CDR SEQUENCE REDESIGN</text>
  <line x1="80" y1="345" x2="355" y2="345" stroke="#ccc" stroke-width="0.8"/>
  <line x1="565" y1="345" x2="840" y2="345" stroke="#ccc" stroke-width="0.8"/>

  <rect x="30" y="352" width="375" height="38" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="217" y="367" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">AbMPNN</text>
  <text x="217" y="382" text-anchor="middle" font-size="9.5" fill="#1976d2">CDR residue redesign (framework &amp; interface residues fixed)</text>

  <rect x="515" y="352" width="375" height="38" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="702" y="367" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1565c0">AbMPNN</text>
  <text x="702" y="382" text-anchor="middle" font-size="9.5" fill="#1976d2">Unchanged · MIT</text>
  <text x="460" y="376" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- ============================================================ -->
  <!-- STAGE 4 -->
  <!-- ============================================================ -->
  <text x="460" y="408" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#555" letter-spacing="1">STAGE 4 — FINAL FILTER  ② OUR PRIMARY CONTRIBUTION</text>
  <line x1="80" y1="413" x2="310" y2="413" stroke="#ccc" stroke-width="0.8"/>
  <line x1="610" y1="413" x2="840" y2="413" stroke="#ccc" stroke-width="0.8"/>

  <!-- PyRosetta block -->
  <rect x="30" y="420" width="375" height="148" rx="5" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="217" y="437" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#c62828">PyRosetta 2025.39</text>
  <text x="217" y="451" text-anchor="middle" font-size="8.5" fill="#e53935">⚠ Commercial license required — UW Tech Transfer Office</text>
  <line x1="50" y1="458" x2="385" y2="458" stroke="#f8bbd0" stroke-width="0.8"/>
  <text x="50" y="472" font-size="9.5" fill="#b71c1c">• FastRelax</text>
  <text x="170" y="472" font-size="9" fill="#777">backbone + sidechain energy minimization</text>
  <text x="50" y="488" font-size="9.5" fill="#b71c1c">• SASA calculation</text>
  <text x="170" y="488" font-size="9" fill="#777">solvent accessible surface area</text>
  <text x="50" y="504" font-size="9.5" fill="#b71c1c">• Shape complementarity</text>
  <text x="170" y="504" font-size="9" fill="#777">interface geometric fit (sc value)</text>
  <text x="50" y="520" font-size="9.5" fill="#b71c1c">• Interface scoring</text>
  <text x="170" y="520" font-size="9" fill="#777">dG, SAP, hbonds via ref2015 force field</text>
  <text x="50" y="536" font-size="9.5" fill="#b71c1c">• IgLM lm_ll</text>
  <text x="170" y="536" font-size="9" fill="#777">final sequence naturalness scoring</text>

  <!-- Red REPLACED arrow - our actual contribution -->
