  <text x="702" y="451" text-anchor="middle" font-size="8.5" fill="#388e3c">✓ MIT / Apache 2.0 / LGPL — no commercial license required</text>
  <line x1="535" y1="458" x2="870" y2="458" stroke="#c8e6c9" stroke-width="0.8"/>
  <text x="535" y="472" font-size="9.5" fill="#1b5e20">• OpenMM + FASPR</text>
  <text x="660" y="472" font-size="9" fill="#555">L-BFGS minimization · OBC2 implicit solvent · sidechain repack</text>
  <text x="535" y="488" font-size="9.5" fill="#1b5e20">• FreeSASA</text>
  <text x="660" y="488" font-size="9" fill="#555">Lee-Richards algorithm</text>
  <text x="535" y="504" font-size="9.5" fill="#1b5e20">• sc-rs (Rust)</text>
  <text x="660" y="504" font-size="9" fill="#555">Connolly surface shape complementarity</text>
  <text x="535" y="520" font-size="9.5" fill="#1b5e20">• Biopython NeighborSearch</text>
  <text x="660" y="520" font-size="9" fill="#555">interface geometry, contacts, RMSD</text>
  <text x="535" y="536" font-size="9.5" fill="#1b5e20">• Fixed pass-through values †</text>
  <text x="660" y="536" font-size="9" fill="#555">binder_score / interface_dG / hbonds</text>
  <text x="535" y="552" font-size="9.5" fill="#1b5e20">• AbLang1 PLL</text>
  <text x="660" y="552" font-size="9" fill="#555">final sequence naturalness scoring</text>

